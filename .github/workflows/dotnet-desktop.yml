name: .NET Desktop Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest  # Required for WPF apps

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore Dependencies
      run: dotnet restore AutoReach/AutoReach.csproj

    - name: Build Application
      run: dotnet build AutoReach/AutoReach.csproj --configuration Release --no-restore

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AutoReach-Executable
        path: AutoReach/bin/Release/net10.0-windows/
